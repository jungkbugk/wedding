<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 카카오톡 공유시 보이는 썸네일 및 제목 설정 (Open Graph) -->
    <meta property="og:title" content="김용현 ❤️ 김유경 결혼합니다">
    <meta property="og:description" content="2026년 1O월 9일 금요일 오후 2시, SY웨딩홀">
    <meta property="og:image" content="썸네일_이미지_URL(ex: https://...)">
    <meta property="og:url" content="이_청첩장의_최종_링크">

    <title>우리 결혼합니다</title>
    
    <!-- 우아한 명조체 폰트 적용 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #fcfbf9;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
            word-break: keep-all;
        }
        /* 모바일 최적화 컨테이너 */
        .container {
            max-width: 480px; 
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            min-height: 100vh;
        }
        /* 메인 사진 영역 */
        .hero-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .section {
            padding: 50px 20px;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; color: #4a4a4a; }
        h2 { font-size: 18px; font-weight: 600; color: #888; margin-bottom: 20px; }
        .date { font-size: 16px; color: #999; margin-bottom: 30px; letter-spacing: 1px; }
        p { line-height: 2.0; font-size: 15px; color: #555; }
        
        /* 계좌번호 박스 */
        .account-box {
            background: #f9f9f9;
            padding: 25px 20px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
        }
        .account-row {
            margin-bottom: 15px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 10px;
        }
        .account-row:last-child {
            margin-bottom: 0; border-bottom: none; padding-bottom: 0;
        }
        .bank-info { display: flex; justify-content: space-between; align-items: center; }
        .copy-btn {
            background: #e0e0e0; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. 메인 사진 -->
        <img src="여기에_메인_웨딩사진_주소를_넣으세요.jpg" alt="웨딩 사진" class="hero-img">

        <!-- 2. 초대 인사말 -->
        <div class="section">
            <h1>김용현 & 김유경</h1>
            <div class="date">2026년 1O월 9일 금요일 오후 2시</div>
            <p>
                서로가 마주보며 다져온 사랑을<br>
                이제 함께 한 곳을 바라보며 걸어갈 수 있는<br>
                큰 사랑으로 키우고자 합니다.<br><br>
                저희 두 사람이 사랑의 이름으로<br>
                지켜나갈 수 있도록 앞날을<br>
                축복해 주시면 감사하겠습니다.
            </p>
        </div>

        <hr style="border: 0; height: 1px; background: #eee; margin: 0 20px;">

        <!-- 3. 오시는 길 -->
        <div class="section">
            <h2>오시는 길</h2>
            <p style="font-size: 18px; font-weight: 600; color: #333;">SY 웨딩홀 9층</p>
            <p>경기도 수원시 봉영로 1612</p>
        </div>

        <hr style="border: 0; height: 1px; background: #eee; margin: 0 20px;">

        <!-- 4. 마음 전하실 곳 (계좌번호) -->
        <div class="section">
            <h2>마음 전하실 곳</h2>
            <div class="account-box">
                <div class="account-row">
                    <div style="font-weight: 600; margin-bottom: 5px;">신랑 측</div>
                    <div class="bank-info">
                        <span>국민은행 741802-00-265034 (김용현)</span>
                        <button class="copy-btn" onclick="copyText('741802-00-265034')">복사</button>
                    </div>
                </div>
                <div class="account-row">
                    <div style="font-weight: 600; margin-bottom: 5px;">신부 측</div>
                    <div class="bank-info">
                        <span>새마을금고 900-321-0456541 (김유경)</span>
                        <button class="copy-btn" onclick="copyText('900-321-0456541')">복사</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 계좌번호 복사 기능 스크립트 -->
    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('계좌번호가 복사되었습니다.');
            }, function(err) {
                alert('복사에 실패했습니다. 직접 선택해서 복사해주세요.');
            });
        }
    </script>
</body>
</html>
